<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Bookmark Sync</title>
  <style>
    body { width: 320px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 14px; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    button { width: 100%; padding: 8px; margin: 4px 0; cursor: pointer; border: 1px solid #ccc; background: #f7f7f7; border-radius: 4px; }
    button:hover { background: #eee; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 12px; color: #666; margin-top: 8px; padding: 8px; background: #f0f0f0; border-radius: 4px; }
    input { width: 100%; padding: 6px; margin: 4px 0; box-sizing: border-box; }
    label { display: block; margin-top: 8px; font-weight: 500; }
  </style>
</head>
<body>
  <h1>📚 Bookmark Manager Sync</h1>

  <label>API 地址</label>
  <input id="apiBase" placeholder="http://localhost:9001/v1" />

  <label>认证 Token（可选）</label>
  <input id="authToken" placeholder="Bearer xxx" type="password" />

  <button id="saveConfig">保存配置</button>

  <hr style="margin: 12px 0;" />

  <button id="syncAll">🔄 全量同步</button>
  <button id="syncCurrent">📌 同步当前页</button>

  <div class="status" id="status">点击按钮开始同步</div>

  <script src="popup.js"></script>
</body>
</html>
